<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Kid's Hub - คลินิกพัฒนาการเด็กบ้านฮักดี</title>
    
    <!-- Google Fonts: Noto Sans Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(200, 169, 126)',
                        primaryLight: 'rgba(200, 169, 126, 0.1)',
                        textMain: '#222222',
                        textSub: '#777777',
                        bgMain: '#F8F9FA'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans Thai"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 40px rgba(200, 169, 126, 0.15)'
                    }
                }
            }
        }
    </script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- SwiperJS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <!-- Viewer.js for Image Zoom -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Day.js -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/th.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/buddhistEra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
    
    <style>
        body {
            background-color: #e5e7eb; 
            overscroll-behavior-y: none; 
        }
        
        #app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #F8F9FA;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-sheet-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; visibility: hidden;
            transition: all 0.3s ease; display: flex; align-items: flex-end; justify-content: center;
        }
        .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet {
            background: white; width: 100%; max-width: 480px; height: 85vh;
            border-radius: 24px 24px 0 0; transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            display: flex; flex-direction: column;
        }
        .bottom-sheet-overlay.active .bottom-sheet { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: #EAEAEA; border-radius: 10px; margin: 12px auto; }
        
        .swiper-pagination-bullet-active { background-color: rgb(200, 169, 126) !important; }
        
        /* ซ่อน Scrollbar สำหรับแถบเมนู Admin */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-textMain">
    <div id="app-container">
        <!-- Main Content Area -->
        <main id="main-content" class="pb-24 min-h-screen"></main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-[480px] bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-40 hidden shadow-[0_-4px_20px_rgba(0,0,0,0.03)] pb-safe rounded-t-2xl">
            <button onclick="navigate('dashboard')" class="nav-item flex flex-col items-center gap-1 text-textSub transition-colors" data-page="dashboard">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">หน้าหลัก</span>
            </button>
            <button onclick="navigate('appointments')" class="nav-item flex flex-col items-center gap-1 text-textSub transition-colors" data-page="appointments">
                <i data-lucide="calendar" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">นัดหมาย</span>
            </button>
            <button onclick="navigate('history')" class="nav-item flex flex-col items-center gap-1 text-textSub transition-colors" data-page="history">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">ประวัติ</span>
            </button>
            <button onclick="navigate('rewards')" class="nav-item flex flex-col items-center gap-1 text-textSub transition-colors" data-page="rewards">
                <i data-lucide="gift" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">คะแนน</span>
            </button>
            <button onclick="navigate('profile')" class="nav-item flex flex-col items-center gap-1 text-textSub transition-colors" data-page="profile">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">โปรไฟล์</span>
            </button>
        </nav>
    </div>

    <!-- Global Bottom Sheet Modal -->
    <div id="global-bottom-sheet" class="bottom-sheet-overlay">
        <div class="bottom-sheet shadow-2xl">
            <div class="sheet-handle"></div>
            <div id="bottom-sheet-content" class="flex-1 overflow-y-auto px-6 pb-6 pt-2"></div>
        </div>
    </div>

    <script>
        dayjs.locale('th');
        dayjs.extend(window.dayjs_plugin_buddhistEra);
        dayjs.extend(window.dayjs_plugin_utc);
        dayjs.extend(window.dayjs_plugin_timezone);
        dayjs.tz.setDefault("Asia/Bangkok");
        
        // =====================================
        // CONFIG & STATE
        // =====================================
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwdUP0_N24bRLr4Dyysf9pBu5bnMYVkkIYhirbjswSMUHCEvxQf0YlcjpwdHULEPsLw/exec';
        
        const State = {
            currentUser: null,
            currentPage: 'landing',
            currentData: null,
            settings: {}
        };

        // State สำหรับ Admin Edit
        window.editingNewsId = null;
        window.editingRewardId = null;

        // =====================================
        // API SERVICE
        // =====================================
        const API = {
            async call(action, payload = {}, showLoading = true) {
                if (showLoading) {
                    Swal.fire({ title: 'กำลังโหลด...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                }
                
                try {
                    const response = await fetch(GAS_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, payload })
                    });
                    
                    const data = await response.json();
                    if (showLoading) Swal.close();
                    
                    if (!data.success) throw new Error(data.message);
                    return data.data;
                } catch (error) {
                    if (showLoading) Swal.close();
                    throw error;
                }
            }
        };

        const Utils = {
            formatDate: (isoString, format = 'DD MMM BBBB') => isoString ? dayjs(isoString).tz('Asia/Bangkok').format(format) : '-',
            formatTime: (isoString) => isoString ? dayjs(isoString).tz('Asia/Bangkok').format('HH:mm น.') : '-',
            closeBottomSheet: () => {
                document.getElementById('global-bottom-sheet').classList.remove('active');
                setTimeout(() => document.getElementById('bottom-sheet-content').innerHTML = '', 300);
            },
            openBottomSheet: (htmlContent) => {
                document.getElementById('bottom-sheet-content').innerHTML = htmlContent;
                document.getElementById('global-bottom-sheet').classList.add('active');
                lucide.createIcons();
            }
        };

        const Cache = {
            get: (key) => {
                try { return JSON.parse(localStorage.getItem('hub_cache_' + key)); } 
                catch(e) { return null; }
            },
            set: (key, data) => {
                try { localStorage.setItem('hub_cache_' + key, JSON.stringify(data)); } 
                catch(e) {}
            },
            clear: () => {
                try {
                    Object.keys(localStorage).forEach(key => {
                        if(key.startsWith('hub_cache_')) localStorage.removeItem(key);
                    });
                } catch(e) {}
            }
        };

        function refreshPage(page) {
            const actionMap = { 'dashboard': 'getDashboard', 'appointments': 'getAppointments', 'history': 'getHistory', 'rewards': 'getRewards', 'profile': 'getProfile' };
            if(actionMap[page]) Cache.set(actionMap[page], null);
            navigate(page);
        }

        async function navigate(page) {
            State.currentPage = page;
            const mainContent = document.getElementById('main-content');
            const bottomNav = document.getElementById('bottom-nav');
            
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('text-primary'); el.classList.add('text-textSub');
            });
            const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
            if (activeNav) { activeNav.classList.remove('text-textSub'); activeNav.classList.add('text-primary'); }

            const renderUI = (data) => {
                State.currentData = data;
                mainContent.className = 'pb-24 min-h-screen fade-in';
                
                switch(page) {
                    case 'landing': bottomNav.classList.add('hidden'); mainContent.innerHTML = Views.Landing(); break;
                    case 'dashboard': bottomNav.classList.remove('hidden'); mainContent.innerHTML = Views.Dashboard(data); initSwiper(); break;
                    case 'appointments': bottomNav.classList.remove('hidden'); mainContent.innerHTML = Views.Appointments(data); break;
                    case 'history': bottomNav.classList.remove('hidden'); mainContent.innerHTML = Views.History(data); break;
                    case 'rewards': bottomNav.classList.remove('hidden'); mainContent.innerHTML = Views.Rewards(data); break;
                    case 'profile': bottomNav.classList.remove('hidden'); mainContent.innerHTML = Views.Profile(data); break;
                    case 'admin': bottomNav.classList.add('hidden'); mainContent.innerHTML = Views.Admin(); break;
                }
                lucide.createIcons();
            };

            if (page === 'landing' || page === 'admin') {
                renderUI({});
                return;
            }

            const actionMap = { 'dashboard': 'getDashboard', 'appointments': 'getAppointments', 'history': 'getHistory', 'rewards': 'getRewards', 'profile': 'getProfile' };
            const action = actionMap[page];
            const payload = { hn: State.currentUser.hn };
            
            const cachedData = Cache.get(action);
            if (cachedData) {
                renderUI(cachedData);
                API.call(action, payload, false).then(freshData => {
                    Cache.set(action, freshData);
                    if(page === State.currentPage && JSON.stringify(cachedData) !== JSON.stringify(freshData)) {
                        renderUI(freshData);
                    }
                }).catch(()=>{});
            } else {
                const skeletonHtml = `
                    <div class="px-6 py-12 space-y-6 animate-pulse">
                        <div class="flex justify-between items-center mb-6">
                            <div class="h-8 bg-gray-200 rounded w-1/3"></div>
                            <div class="h-8 w-8 bg-gray-200 rounded-full"></div>
                        </div>
                        <div class="h-32 bg-gray-200 rounded-3xl w-full"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="h-24 bg-gray-200 rounded-3xl w-full"></div>
                            <div class="h-24 bg-gray-200 rounded-3xl w-full"></div>
                        </div>
                        <div class="h-24 bg-gray-200 rounded-3xl w-full"></div>
                        <div class="h-24 bg-gray-200 rounded-3xl w-full"></div>
                    </div>
                `;
                mainContent.innerHTML = skeletonHtml;
                bottomNav.classList.remove('hidden');
                try {
                    const freshData = await API.call(action, payload, false);
                    Cache.set(action, freshData);
                    renderUI(freshData);
                } catch(error) {
                    Swal.fire('เกิดข้อผิดพลาด', error.message || 'ไม่สามารถโหลดข้อมูลได้', 'error');
                    if(!State.currentUser) { logout(); }
                }
            }
        }

        async function login(e) {
            e.preventDefault();
            const hn = document.getElementById('login-hn').value.trim();
            const phone = document.getElementById('login-phone').value.trim();

            try {
                const user = await API.call('login', { hn, phone });
                State.currentUser = user;
                localStorage.setItem('hub_session', JSON.stringify(user));
                Cache.clear(); 
                Utils.closeBottomSheet();
                
                if(user.role === 'admin') {
                    navigate('admin');
                } else {
                    navigate('dashboard');
                    Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', text: `ยินดีต้อนรับ ${user.parentName || user.name}`, confirmButtonColor: 'rgb(200, 169, 126)', timer: 1500 });
                }
            } catch(err) {
                Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: err.message, confirmButtonColor: 'rgb(200, 169, 126)' });
            }
        }

        function logout() {
            Swal.fire({ title: 'ต้องการออกจากระบบ?', icon: 'question', showCancelButton: true, confirmButtonColor: 'rgb(200, 169, 126)', cancelButtonColor: '#EAEAEA', confirmButtonText: 'ออกจากระบบ', cancelButtonText: '<span class="text-textMain">ยกเลิก</span>'
            }).then((result) => {
                if (result.isConfirmed) {
                    State.currentUser = null;
                    localStorage.removeItem('hub_session');
                    Cache.clear(); 
                    navigate('landing');
                }
            });
        }

        // =====================================
        // VIEWS (HTML Templates)
        // =====================================
        const Views = {
            Landing: () => {
                const bgImage = State.settings?.main_image_url || 'https://images.unsplash.com/photo-1516627145497-ae6968895b74?q=80&w=1000&auto=format&fit=crop';
                const logoImage = State.settings?.logo_url;
                
                const logoHtml = logoImage 
                    ? `<img src="${logoImage}" class="w-20 h-20 rounded-full mx-auto mb-6 object-cover border-2 border-primary/30 shadow-md">`
                    : `<div class="w-20 h-20 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-6 backdrop-blur-sm border border-primary/30">
                            <i data-lucide="heart-handshake" class="w-10 h-10 text-primary"></i>
                       </div>`;

                return `
                <div class="h-screen w-full relative flex flex-col justify-end bg-gray-900">
                    <img src="${bgImage}" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Background">
                    <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent"></div>
                    
                    <div class="relative z-10 p-8 pb-16 text-center">
                        ${logoHtml}
                        <h1 class="text-4xl font-bold text-textMain mb-2 tracking-tight">My Kid's Hub</h1>
                        <h2 class="text-lg text-primary font-medium mb-4">คลินิกพัฒนาการเด็กบ้านฮักดี</h2>
                        <p class="text-textSub text-sm mb-10 leading-relaxed max-w-[280px] mx-auto">
                            ติดตามพัฒนาการของน้องๆ ผ่านความรัก และความเอาใจใส่จากเรา
                        </p>
                        <button onclick="Views.showLoginModal()" class="w-full bg-primary text-white rounded-full py-4 font-semibold text-lg shadow-floating hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                            เข้าใช้งานระบบ <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                `;
            },
            
            showLoginModal: () => {
                const html = `
                    <div class="text-center mb-8">
                        <h3 class="text-2xl font-bold text-textMain mb-2">ยินดีต้อนรับ</h3>
                        <p class="text-textSub text-sm">กรุณากรอกข้อมูลเข้าสู่ระบบของคุณ</p>
                    </div>
                    <form onsubmit="login(event)" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-textMain mb-2">รหัสผู้รับบริการ (HN no.)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="credit-card" class="w-5 h-5 text-gray-400"></i>
                                </div>
                                <input type="text" inputmode="numeric" id="login-hn" required placeholder="เช่น 68001" value="" class="w-full pl-11 pr-4 py-3.5 bg-bgMain border border-gray-200 rounded-2xl focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-textMain mb-2">เบอร์โทรศัพท์ผู้ปกครอง</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="phone" class="w-5 h-5 text-gray-400"></i>
                                </div>
                                <input type="text" inputmode="tel" id="login-phone" required placeholder="เช่น 0123456789" value="" class="w-full pl-11 pr-4 py-3.5 bg-bgMain border border-gray-200 rounded-2xl focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white rounded-full py-4 font-semibold text-lg shadow-soft mt-8">
                            เข้าสู่ระบบ
                        </button>
                        <button type="button" onclick="Views.forgotHN()" class="w-full text-textSub text-sm font-medium mt-3 hover:text-primary transition-colors underline decoration-1 underline-offset-4">
                            ไม่ทราบหรือลืมรหัส HN
                        </button>
                    </form>
                `;
                Utils.openBottomSheet(html);
            },

            forgotHN: () => {
                Swal.fire({
                    title: 'ไม่ทราบหรือลืมรหัส HN',
                    html: 'โปรดติดต่อคลินิก<br>โทร. <span class="font-bold text-primary">0946753557</span>',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonColor: 'rgb(200, 169, 126)',
                    cancelButtonColor: '#EAEAEA',
                    confirmButtonText: 'โทรออกเลย',
                    cancelButtonText: '<span class="text-textMain">ปิด</span>'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = 'tel:0946753557';
                    }
                });
            },

            Dashboard: (data) => {
                const user = State.currentUser;
                const course = data.course || {};
                const upcomingAppt = data.upcomingAppointment;
                const news = data.news || [];
                
                return `
                    <header class="bg-white px-6 pt-6 pb-6 rounded-b-3xl shadow-soft relative z-10">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <img src="${user.avatar}" class="w-14 h-14 rounded-full border-2 border-primaryLight object-cover">
                                <div>
                                    <p class="text-xs text-textSub font-medium mb-0.5">ยินดีต้อนรับ</p>
                                    <h2 class="text-base font-bold text-textMain leading-tight">${user.parentName}</h2>
                                </div>
                            </div>
                            <button onclick="refreshPage('dashboard')" class="relative p-2 bg-bgMain rounded-full text-textMain hover:bg-gray-200 transition-colors">
                                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </header>

                    <div class="px-6 py-6 space-y-6">
                        <div class="bg-gradient-to-br from-primary to-[#b89565] rounded-3xl p-6 text-white shadow-floating relative overflow-hidden">
                            <div class="absolute -right-6 -top-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                            <div class="flex justify-between items-start relative z-10">
                                <div>
                                    <p class="text-white/80 text-xs mb-1 font-medium">ข้อมูลผู้รับบริการ</p>
                                    <h3 class="text-2xl font-bold mb-1">${user.patientName}</h3>
                                    <p class="text-sm text-white/90">${user.nickname ? (user.nickname.startsWith('น้อง') ? user.nickname : 'น้อง' + user.nickname) : ''} • HN: ${user.hn}</p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-5 rounded-3xl shadow-soft border border-gray-50 flex flex-col justify-center">
                                <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mb-3">
                                    <i data-lucide="layers" class="w-5 h-5"></i>
                                </div>
                                <p class="text-xs text-textSub font-medium mb-1">คอร์สคงเหลือ</p>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-2xl font-bold text-textMain">${course.remaining_course || 0}</span>
                                    <span class="text-sm text-textSub">/ ${course.total_course || 0} ครั้ง</span>
                                </div>
                            </div>

                            <div onclick="navigate('rewards')" class="bg-white p-5 rounded-3xl shadow-soft border border-gray-50 flex flex-col justify-center cursor-pointer">
                                <div class="w-10 h-10 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center mb-3">
                                    <i data-lucide="star" class="w-5 h-5"></i>
                                </div>
                                <p class="text-xs text-textSub font-medium mb-1">คะแนนสะสม</p>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-2xl font-bold text-textMain">${course.point_balance || 0}</span>
                                    <span class="text-sm text-textSub">แต้ม</span>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-4">
                                <h3 class="text-lg font-bold text-textMain">นัดหมายครั้งต่อไป</h3>
                                <button onclick="navigate('appointments')" class="text-sm text-primary font-medium">ดูทั้งหมด</button>
                            </div>
                            ${upcomingAppt ? `
                                <div class="bg-white p-5 rounded-3xl shadow-soft border border-gray-50 flex items-center gap-4">
                                    <div class="bg-primaryLight text-primary p-3 rounded-2xl flex flex-col items-center justify-center min-w-[60px]">
                                        <span class="text-sm font-bold">${dayjs(upcomingAppt.appointment_date).format('DD')}</span>
                                        <span class="text-xs">${dayjs(upcomingAppt.appointment_date).format('MMM')}</span>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-textMain mb-1">${upcomingAppt.appointment_type}</h4>
                                        <p class="text-xs text-textSub flex items-center gap-1">

        function viewNewsImage(url) {
            const img = document.createElement('img');
            img.src = url;
            const viewer = new Viewer(img, {
                hidden: function () { viewer.destroy(); },
                toolbar: false, navbar: false, title: false, button: true, backdrop: true, zoomRatio: 0.2
            });
            viewer.show();
        }

        function adminSwitchTab(tabId) {
            const tabs = ['points', 'admin-redeem', 'settings', 'news', 'rewards'];
            tabs.forEach(t => {
                document.getElementById(`admin-content-${t}`).classList.add('hidden');
                const btn = document.getElementById(`admin-tab-${t}`);
                btn.className = 'whitespace-nowrap pb-3 text-sm font-bold text-white/50 border-b-2 border-transparent px-1 transition-all';
            });
            document.getElementById(`admin-content-${tabId}`).classList.remove('hidden');
            document.getElementById(`admin-tab-${tabId}`).className = 'whitespace-nowrap pb-3 text-sm font-bold text-primary border-b-2 border-primary px-1 transition-all';
            
            if(tabId === 'settings') adminLoadSettings();
            if(tabId === 'news') adminLoadNews();
            if(tabId === 'rewards') adminLoadRewards();
        }

        // --- Admin Settings Functions ---
        async function adminLoadSettings() {
            try {
                const settings = await API.call('adminGetSettings', {}, false);
                if (settings) {
                    document.getElementById('admin-setting-main').value = settings.main_image_url || '';
                    document.getElementById('admin-setting-logo').value = settings.logo_url || '';
                    document.getElementById('admin-setting-avatar').value = settings.avatar_url || '';
                }
            } catch(e) { console.error(e); }
        }

        async function adminSaveSettings() {
            const main = document.getElementById('admin-setting-main').value.trim();
            const logo = document.getElementById('admin-setting-logo').value.trim();
            const avatar = document.getElementById('admin-setting-avatar').value.trim();
            
            try {
                await API.call('adminSaveSettings', { main_image_url: main, logo_url: logo, avatar_url: avatar });
                Swal.fire({icon:'success', title:'บันทึกสำเร็จ', timer:1500, showConfirmButton:false});
            } catch(e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
        }

        // --- Admin News Functions ---
        async function adminLoadNews() {
            try {
                const news = await API.call('adminGetNews', {}, false);
                const container = document.getElementById('admin-news-list');
                if(!news || news.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-sm text-gray-400 border border-dashed rounded-xl">ไม่มีข่าวสาร</div>';
                    return;
                }
                container.innerHTML = news.map(n => `
                    <div class="flex items-center gap-3 p-3 bg-white border border-gray-100 rounded-xl shadow-sm">
                        <img src="${n.image_url}" class="w-16 h-12 object-cover rounded-md bg-gray-100">
                        <div class="flex-1 min-w-0">
                            <h5 class="text-sm font-bold text-textMain truncate">${n.title}</h5>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="adminEditNews('${n.id}', '${n.title.replace(/'/g, "\\'")}', '${n.image_url}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition"><i data-lucide="edit" class="w-4 h-4"></i></button>
                            <button onclick="adminDeleteNews('${n.id}')" class="p-2 text-red-400 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        function adminEditNews(id, title, url) {
            window.editingNewsId = id;
            document.getElementById('admin-news-title').value = title;
            document.getElementById('admin-news-image').value = url;
            document.getElementById('admin-news-submit-btn').innerText = 'บันทึกการแก้ไข';
            document.getElementById('admin-news-submit-btn').classList.replace('bg-blue-500', 'bg-green-500');
            document.getElementById('admin-news-cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function adminCancelEditNews() {
            window.editingNewsId = null;
            document.getElementById('admin-news-title').value = '';
            document.getElementById('admin-news-image').value = '';
            document.getElementById('admin-news-submit-btn').innerText = 'เพิ่มข่าวสารใหม่';
            document.getElementById('admin-news-submit-btn').classList.replace('bg-green-500', 'bg-blue-500');
            document.getElementById('admin-news-cancel-btn').classList.add('hidden');
        }

        async function adminSaveNews() {
            const title = document.getElementById('admin-news-title').value.trim();
            const imageUrl = document.getElementById('admin-news-image').value.trim();
            if(!title || !imageUrl) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกหัวข้อและรูปภาพ', 'warning');

            try {
                if (window.editingNewsId) {
                    await API.call('adminUpdateNews', { id: window.editingNewsId, title, imageUrl });
                    Swal.fire({icon:'success', title:'บันทึกการแก้ไขสำเร็จ', timer:1000, showConfirmButton:false});
                } else {
                    await API.call('adminAddNews', { title, imageUrl });
                    Swal.fire({icon:'success', title:'เพิ่มสำเร็จ', timer:1000, showConfirmButton:false});
                }
                adminCancelEditNews();
                adminLoadNews();
                Cache.set('getDashboard', null); 
            } catch(e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
        }

        async function adminDeleteNews(id) {
            Swal.fire({ title: 'ลบข่าวสาร?', icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#ef4444' }).then(async (res) => {
                if(res.isConfirmed) {
                    try {
                        await API.call('adminDeleteNews', { id });
                        adminLoadNews();
                        Cache.set('getDashboard', null);
                    } catch(e) { Swal.fire('เกิดข้อผิดพลาด', e.message, 'error'); }
                }
            });
        }

        async function confirmRedeem(reward) {
            if (window.currentPoints < reward.point_required || reward.quantity <= 0) return;

            const detailsHtml = reward.details ? `<div style="font-size: 12px; color: #666; background: #f9fafb; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: left;"><b>เงื่อนไข/รายละเอียด:</b><br>${reward.details.replace(/\n/g, '<br>')}</div>` : '';

            Swal.fire({
                title: 'ยืนยันการแลกรางวัล?',
                html: `ใช้ <b>${reward.point_required} แต้ม</b> เพื่อแลก <b>${reward.reward_name}</b>${detailsHtml}`,
                imageUrl: reward.reward_url, imageWidth: 100, imageHeight: 100,
                showCancelButton: true, confirmButtonColor: 'rgb(200, 169, 126)',
                cancelButtonColor: '#EAEAEA', confirmButtonText: 'ยืนยันการแลก', cancelButtonText: '<span class="text-textMain">ยกเลิก</span>'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await API.call('redeemReward', { hn: State.currentUser.hn, rewardId: reward.id });
                        Cache.set('getRewards', null); 
                        Cache.set('getDashboard', null); 
                        Swal.fire({
                            icon: 'success', title: 'แลกรางวัลสำเร็จ!',
                            html: `รหัสรับรางวัลของคุณคือ<br><br><div class="text-2xl font-mono font-bold tracking-widest bg-gray-100 p-3 rounded-lg inline-block">${res.couponCode}</div><br><br><span class="text-sm text-gray-500">แคปหน้าจอเพื่อรับรางวัลที่คลินิก</span>`,
                            confirmButtonColor: 'rgb(200, 169, 126)'
                        }).then(() => navigate('rewards'));
                    } catch(err) {
                        Swal.fire('ข้อผิดพลาด', err.message, 'error');
                    }
                }
            });
        }

        async function adminSearchUser() {
            const hn = document.getElementById('admin-hn').value.trim();
            if(!hn) return;
            try {
                const data = await API.call('adminGetPatient', { hn });
                document.getElementById('admin-name').innerText = data.name;
                document.getElementById('admin-points').innerText = data.points;
                document.getElementById('admin-user-info').classList.remove('hidden');
                document.getElementById('admin-point-action').classList.remove('hidden');
                window.adminSelectedHn = hn;
            } catch(e) {
                Swal.fire('ไม่พบข้อมูล', e.message, 'error');
            }
        }

        async function adminUpdatePoints() {
            const change = document.getElementById('admin-point-change').value;
            const reason = document.getElementById('admin-point-reason').value.trim();
            if(!change) return Swal.fire('โปรดระบุคะแนน', 'กรุณาระบุคะแนนที่ต้องการเพิ่มหรือลด', 'warning');
            if(!reason) return Swal.fire('โปรดระบุเหตุผล', 'กรุณาระบุเหตุผลการเพิ่ม/ลดคะแนน', 'warning');

            try {
                const res = await API.call('adminUpdatePoints', { hn: window.adminSelectedHn, pointChange: change, reason: reason });
                Swal.fire('สำเร็จ', `อัปเดตคะแนนเรียบร้อยแล้ว<br>คะแนนล่าสุด: ${res.newPoints}`, 'success');
                document.getElementById('admin-points').innerText = res.newPoints;
                document.getElementById('admin-point-change').value = '';
                document.getElementById('admin-point-reason').value = '';
            } catch(e) {
                Swal.fire('ข้อผิดพลาด', e.message, 'error');
            }
        }

        async function adminSearchRedeemUser() {
            const hn = document.getElementById('admin-redeem-hn').value.trim();
            if(!hn) return;
            try {
                const data = await API.call('adminGetPatient', { hn });
                window.adminSelectedRedeemHn = hn;
                window.adminSelectedRedeemPoints = data.points;
                
                document.getElementById('admin-redeem-name').innerText = data.name;
                document.getElementById('admin-redeem-points').innerText = data.points;
                document.getElementById('admin-redeem-user-info').classList.remove('hidden');
                
                const rewards = await API.call('adminGetRewardsList', {}, false);
                const container = document.getElementById('admin-redeem-rewards-container');
                if(!rewards || rewards.length === 0) {
                    container.innerHTML = '<p class="col-span-2 text-sm text-center text-gray-400 py-4">ไม่มีของรางวัลในระบบ</p>';
                } else {
                    container.innerHTML = rewards.map(r => `
                        <div class="bg-bgMain rounded-2xl p-3 border border-gray-100 flex flex-col">
                            <img src="${r.reward_url}" class="w-full h-24 object-cover rounded-xl mb-2">
                            <h4 class="font-bold text-xs text-textMain line-clamp-2 mb-1">${r.reward_name}</h4>
                            <span class="text-primary font-bold text-xs mb-2">${r.point_required} แต้ม (เหลือ ${r.quantity})</span>
                            <button onclick='adminConfirmRedeemForUser(${JSON.stringify(r).replace(/'/g, "&apos;")})' ${data.points >= r.point_required && r.quantity > 0 ? '' : 'disabled'} class="w-full mt-auto py-2 bg-primary text-white rounded-lg text-xs font-semibold ${data.points >= r.point_required && r.quantity > 0 ? '' : 'opacity-50 cursor-not-allowed'}">
                                ${r.quantity <= 0 ? 'ของหมด' : (data.points >= r.point_required ? 'แลกให้ลูกค้า' : 'แต้มไม่พอ')}
                            </button>
                        </div>
                    `).join('');
                }
                document.getElementById('admin-redeem-rewards-list').classList.remove('hidden');
                
            } catch(e) {
                Swal.fire('ไม่พบข้อมูล', e.message, 'error');
            }
        }

        async function adminConfirmRedeemForUser(reward) {
            const currentPoints = window.adminSelectedRedeemPoints;
            const hn = window.adminSelectedRedeemHn;

            if (currentPoints < reward.point_required || reward.quantity <= 0) return;

            Swal.fire({
                title: 'ยืนยันการแลกให้ลูกค้า?',
                text: `ตัด ${reward.point_required} แต้ม จาก HN: ${hn} เพื่อแลก ${reward.reward_name}`,
                showCancelButton: true, confirmButtonColor: 'rgb(200, 169, 126)', confirmButtonText: 'ยืนยันการแลก', cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await API.call('redeemReward', { hn: hn, rewardId: reward.id });
                        Swal.fire({
                            icon: 'success', title: 'แลกรางวัลสำเร็จ!',
                            html: `คูปองสำหรับลูกค้ารหัสนี้คือ<br><br><div class="text-2xl font-mono font-bold bg-gray-100 p-3 rounded-lg inline-block">${res.couponCode}</div>`,
                            confirmButtonColor: 'rgb(200, 169, 126)'
                        });
                        // รีเฟรชข้อมูลโชว์แต้มที่ลดลงทันที
                        adminSearchRedeemUser();
                    } catch(err) {
                        Swal.fire('ข้อผิดพลาด', err.message, 'error');
                    }
                }
            });
        }

        function initSwiper() {
            setTimeout(() => {
                if(document.querySelector('.newsSwiper')) {
                    new Swiper(".newsSwiper", { spaceBetween: 10, centeredSlides: true, autoplay: { delay: 3500, disableOnInteraction: false }, pagination: { el: ".swiper-pagination", clickable: true } });
                }
            }, 100);
        }

        document.getElementById('global-bottom-sheet').addEventListener('click', function(e) {
            if(e.target === this) Utils.closeBottomSheet();
        });

        async function initApp() {
            try {
                const settings = await API.call('getPublicSettings', {}, false);
                State.settings = settings || {};
            } catch(e) {
                console.warn("Failed to load settings:", e.message);
            }

            const savedSession = localStorage.getItem('hub_session');
            if (savedSession) {
                State.currentUser = JSON.parse(savedSession);
                if (State.settings.logo_url) State.currentUser.avatar = State.settings.logo_url;
                
                if(State.currentUser.role === 'admin') navigate('admin');
                else navigate('dashboard');
            } else {
                navigate('landing');
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
